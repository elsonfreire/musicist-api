spring:
  application:
    name: music-streak

  datasource:
    url: ${DB_URL}
    username: ${DB_NAME} 
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

api:
  security:
    token:
      secret: ${JWT_SECRET:musicist-secret-key}