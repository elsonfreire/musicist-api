spring:
  application:
    name: musicist

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/musicist_api}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

api:
  security:
    token:
      secret: ${JWT_SECRET:musicist-secret-key}
